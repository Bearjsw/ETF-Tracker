name: Collect Daily ETF Data

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Collect holdings
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python scripts/collect_daily.py

      - name: Compute holdings diff
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: python scripts/compute_holdings_diff.py --date $(date -u +%F)

      - name: Compute signals
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: python scripts/compute_signals.py --date $(date -u +%F)
