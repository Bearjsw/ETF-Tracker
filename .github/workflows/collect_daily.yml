name: Collect Daily ETF Data

on:
  schedule:
    # 매 평일 KST 18:00 (UTC 09:00) — KRX 장 마감·공시 이후
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      from_date:
        description: "수집 시작일 (YYYY-MM-DD, 비우면 마지막 스냅샷 다음날)"
        required: false
      to_date:
        description: "수집 종료일 (YYYY-MM-DD, 비우면 어제)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 마지막 스냅샷 이후 빠진 영업일을 모두 따라잡고(병렬 수집),
      # 비중 변화·시그널·주가·NAV·흐름 추정까지 한 번에 갱신한다.
      - name: Collect recent ETF data (catch up + downstream)
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          ARGS="--workers 6"
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            ARGS="$ARGS --from ${{ github.event.inputs.from_date }}"
          fi
          if [ -n "${{ github.event.inputs.to_date }}" ]; then
            ARGS="$ARGS --to ${{ github.event.inputs.to_date }}"
          fi
          python -u scripts/collect_recent.py $ARGS
